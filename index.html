		.card.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
		.profile { width: 64px; height: 64px; margin: 0 auto 0.75rem auto; display: block; object-fit: cover; border-radius: 4px; }

		.username-wrapper { text-align: center; }
		.links { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 0.375rem; }
		.link-item { border: 1px solid rgba(110, 100, 150, 0.3); display: flex; align-items: center; gap: 0.625rem; padding: 0.5rem 0.65rem; background: transparent; text-decoration: none; transition: all 0.13s ease; padding: 0.76em; }

		.link-item:hover .link-desc { color: #333333; }
		.link-item:hover .link-icon-invert { filter: invert(0); }
		.link-icon { width: 18px; height: 18px; object-fit: contain; flex-shrink: 0; }
		.link-icon-invert { width: 18px; height: 18px; object-fit: contain; flex-shrink: 0; filter: invert(1); }
		.link-labels { display: flex; align-items: baseline; justify-content: space-between; min-width: 0; flex-grow: 1; }
		.link-site { color: #f0f0f0; font-size: 0.85rem; letter-spacing: 0.5px; font-weight: normal; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
		.link-desc { color: #a0a0a0; font-size: 0.7rem; letter-spacing: 0.5px; font-weight: normal; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
		hr { border: none; border-top: 1px solid rgba(100, 100, 110, 0.25); margin: 1.5rem 0; }
		.update { text-align: center; font-size: 0.7rem; color: #888888; margin-top: 1.5rem; letter-spacing: 1px; }
		.toggle-screen { position: fixed; bottom: 20px; right: 20px; z-index: 10; background: rgba(255, 255, 255, 0.05);; border: 0; color: #ccc; font-size: 0.5rem; padding: 5px; transition: all 0.2s ease; }

	<button class="toggle-screen" id="screenBtn">_</button>
	<script>

	// "linking starfield", javascript, copyright (c) 2026 GapVR

	const CONFIG =
	{
		numStars: 280,
		speed: 0.6,
		maxDepth: 100,
		perspective: 90,
		spread: 300,
		connectionDist: 60,
		pixelScale: 2,		// resolution divisor
		maxStarSize: 3,		// near = max
		blinkDuration: 1,	// new lines flash
		colors:
		{
			background: '#030006',
			lineNormal: { r: 180, g: 0, b: 255 },
			lineBlink: 'rgba(255, 100, 255, 1)',
			starHueStart: 280,
			starHueEnd: 400,
			starLightnessStart: 25,
			starLightnessEnd: 95
		}
	};

	const canvas = document.getElementById('starfield');
	const ctx = canvas.getContext('2d');

	let stars = [];
	let width, height;
	let centerX, centerY;

	let activeConnections = new Map();

	function initStars()
	{
		stars = [];
		for (let i = 0; i < CONFIG.numStars; i++)
		{
			stars.push({
				x: Math.random() * CONFIG.spread * 2 - CONFIG.spread,
				y: Math.random() * CONFIG.spread * 2 - CONFIG.spread,
				z: Math.random() * CONFIG.maxDepth
			});
		}
	}

	function updateStars()
	{
		for (let i = 0; i < stars.length; i++)
		{
			const star = stars[i];
			star.z -= CONFIG.speed;

			if (star.z <= 0)
			{
				star.z = CONFIG.maxDepth;
				star.x = Math.random() * CONFIG.spread * 2 - CONFIG.spread;
				star.y = Math.random() * CONFIG.spread * 2 - CONFIG.spread;
			}

			const scale = CONFIG.perspective / star.z;
			star.screenX = Math.floor(centerX + star.x * scale);
			star.screenY = Math.floor(centerY + star.y * scale);
		}
	}

	function drawStars()
	{
		ctx.globalCompositeOperation = 'source-over';
		ctx.fillStyle = CONFIG.colors.background;
		ctx.fillRect(0, 0, width, height);

		ctx.globalCompositeOperation = 'lighter';

		let nextConnections = new Map();
		ctx.lineWidth = 1;
		const cNormal = CONFIG.colors.lineNormal;

		for (let i = 0; i < stars.length; i++)
		{
			for (let j = i + 1; j < stars.length; j++)
			{
				const dx = stars[i].screenX - stars[j].screenX;
				const dy = stars[i].screenY - stars[j].screenY;
				const dist = Math.sqrt(dx * dx + dy * dy);

				if (dist < CONFIG.connectionDist)
				{
					const key = i * 10000 + j;
					let blinkTimer = 0;

					if (!activeConnections.has(key))
					{
						blinkTimer = CONFIG.blinkDuration;
					} else {
						blinkTimer = Math.max(0, activeConnections.get(key) - 1);
					}
					nextConnections.set(key, blinkTimer);

					if (blinkTimer > 0)
					{
						ctx.strokeStyle = CONFIG.colors.lineBlink;
					} else {
						const opacity = (1 - dist / CONFIG.connectionDist) * 0.5;
						ctx.strokeStyle = `rgba(${cNormal.r}, ${cNormal.g}, ${cNormal.b}, ${opacity})`;
					}

					ctx.beginPath();
					ctx.moveTo(stars[i].screenX, stars[i].screenY);
					ctx.lineTo(stars[j].screenX, stars[j].screenY);
					ctx.stroke();
				}
			}
		}
		activeConnections = nextConnections;

		for (const star of stars)
		{
			if (star.screenX >= 0 && star.screenX <= width && star.screenY >= 0 && star.screenY <= height)
			{
				const depthFactor = 1 - star.z / CONFIG.maxDepth;
				const size = Math.max(1, Math.floor(depthFactor * CONFIG.maxStarSize));

				const hue = CONFIG.colors.starHueStart + depthFactor * (CONFIG.colors.starHueEnd - CONFIG.colors.starHueStart);
				const lightness = CONFIG.colors.starLightnessStart + depthFactor * (CONFIG.colors.starLightnessEnd - CONFIG.colors.starLightnessStart);

				ctx.fillStyle = `hsl(${hue}, 100%, ${lightness}%)`;
				ctx.fillRect(star.screenX, star.screenY, size, size);
			}
		}

		ctx.globalCompositeOperation = 'source-over';
	}

	function resizeCanvas()
	{
		width = Math.floor(window.innerWidth / CONFIG.pixelScale);
		height = Math.floor(window.innerHeight / CONFIG.pixelScale);
		centerX = width / 2;
		centerY = height / 2;

		canvas.width = width;
		canvas.height = height;

		canvas.style.width = window.innerWidth + 'px';
		canvas.style.height = window.innerHeight + 'px';
		canvas.style.imageRendering = 'pixelated';

		initStars();
	}

	function animate()
	{
		updateStars();
		drawStars();
		requestAnimationFrame(animate);
	}

	window.addEventListener('resize', resizeCanvas);
	resizeCanvas();
	animate();
	</script>
	<script>
		const card = document.getElementById('mainCard');
		const btn = document.getElementById('screenBtn');
		function toggleScreen()
		{
			card.classList.toggle('hidden');
			if (card.classList.contains('hidden'))
				btn.innerHTML = '️<i><font style="font-size: 0.7rem; font-style: italic; color: grey;">"linking starfield" 2026 </font><font style="font-size: 0.7rem; font-style: italic; color: #EEE;">ぎん(Gin)</font>';
			else
				btn.innerHTML = ' _ ';
		}
		btn.addEventListener('click', toggleScreen);
	</script>
